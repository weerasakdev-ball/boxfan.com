<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เครื่องมือดึงข้อมูลนักมวย</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="40ec0b51-4f08-45be-801d-9cf01fc79260"></script>
</head>
<body style="font-family: sans-serif; padding: 30px; background-color: #f0f2f5;">
    
    <h2 style="color: #e8412e;">🛠️ เครื่องมือแปลงไฟล์ .db เป็น .js</h2>
    
    <p><b>ขั้นตอนที่ 1:</b> กดปุ่มด้านล่างเพื่อเลือกไฟล์ <code>fighters.db</code> ของคุณ</p>
    <input type="file" id="dbfile" accept=".db,.sqlite" style="padding: 10px; font-size: 16px; background: white; border: 1px solid #ccc; border-radius: 5px; cursor: pointer;">
    
    <p style="margin-top: 20px;"><b>ขั้นตอนที่ 2:</b> รอให้ระบบประมวลผล (ต้องต่ออินเทอร์เน็ต) จากนั้นให้ <b>ก๊อปปี้ข้อความทั้งหมด</b> ในกล่องด้านล่างนี้ไปใช้งาน</p>
    <textarea id="output" style="width: 100%; height: 400px; padding: 15px; font-family: monospace; font-size: 14px; border: 2px solid #ccc; border-radius: 8px;"></textarea>

    <script>
        document.getElementById('dbfile').addEventListener('change', function() {
            const file = this.files[0];
            if (!file) return;
            
            document.getElementById('output').value = "กำลังดูดข้อมูล กรุณารอสักครู่...";

            const reader = new FileReader();
            reader.onload = function() {
                const Uints = new Uint8Array(reader.result);
                
                // สั่งการให้ sql.js ทำงาน
                initSqlJs({ locateFile: filename => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${filename}` }).then(function(SQL){
                    try {
                        const db = new SQL.Database(Uints);
                        
                        // 1. ดึงข้อมูลประวัตินักมวย
                        const fightersResult = db.exec("SELECT * FROM fighters");
                        let fightersArr = [];
                        if (fightersResult.length > 0) {
                            const cols = fightersResult[0].columns;
                            fightersResult[0].values.forEach(row => {
                                let obj = {};
                                cols.forEach((col, i) => { obj[col] = row[i]; });
                                fightersArr.push(obj);
                            });
                        }

                        // 2. ดึงข้อมูลสถิติการชก
                        const historyResult = db.exec("SELECT * FROM fight_history");
                        let historyArr = [];
                        if (historyResult.length > 0) {
                            const cols = historyResult[0].columns;
                            historyResult[0].values.forEach(row => {
                                let obj = {};
                                cols.forEach((col, i) => { obj[col] = row[i]; });
                                historyArr.push(obj);
                            });
                        }

                        // 3. ประกอบร่างเป็นโค้ด JavaScript ที่เว็บต้องการ
                        let jsOutput = "/* ข้อมูลนักมวยอัปเดตล่าสุด */\n\n";
                        jsOutput += "var FIGHTERS = " + JSON.stringify(fightersArr, null, 2) + ";\n\n";
                        jsOutput += "var HISTORY = " + JSON.stringify(historyArr, null, 2) + ";\n";

                        document.getElementById('output').value = jsOutput;
                    } catch (err) {
                        document.getElementById('output').value = "เกิดข้อผิดพลาด: " + err.message + "\n\nโปรดตรวจสอบว่าเลือกไฟล์ fighters.db ถูกต้องหรือไม่";
                    }
                });
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
