/* ═══════════════════════════════════════════════════════
   BOXFAN — PROFILE PAGE · DARK / LIGHT MODE
   ═══════════════════════════════════════════════════════ */

/* ── Dark Mode (default) ── */


/* ── Light Mode ── */


*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;font-family:var(--sans);color:var(--tx);font-size:15px;line-height:1.55;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-feature-settings:"tnum" 1;
  background:
    radial-gradient(70% 50% at 16% -6%, var(--body-bg-a) 0%, transparent 60%),
    radial-gradient(70% 50% at 88% -4%, var(--body-bg-b) 0%, transparent 60%),
    linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 380px, var(--bg) 100%);
  background-attachment:fixed;
}
[data-theme="light"] body{
  background:
    radial-gradient(70% 50% at 16% -6%, var(--body-bg-a) 0%, transparent 60%),
    radial-gradient(70% 50% at 88% -4%, var(--body-bg-b) 0%, transparent 60%),
    linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 380px, var(--bg) 100%);
}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background-image:repeating-linear-gradient(115deg, rgba(255,255,255,.012) 0 2px, transparent 2px 7px)}
[data-theme="light"] body::before{opacity:.2;background-image:repeating-linear-gradient(115deg,rgba(0,0,0,.016) 0 2px,transparent 2px 7px)}
body>*{position:relative;z-index:1}
a{color:inherit;text-decoration:none}
::selection{background:var(--red);color:#fff}
.ic{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;vertical-align:middle}
.ic svg{display:block;width:1em;height:1em;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;fill:none}

/* ── smooth transitions ── */
*,[data-theme="light"] *{
  transition-property:background-color,border-color,color,box-shadow;
  transition-duration:.22s;transition-timing-function:ease;
}
.hero,.opp-av,.hav,.ptab,.theme-toggle svg{transition:none!important}
.ptab{transition:background .15s,color .15s,box-shadow .15s!important}
.opp-av{transition:border-color .15s,box-shadow .15s!important}
.hav{transition:none!important}
.theme-toggle{transition:transform .2s,box-shadow .2s,background-color .22s!important}
.theme-toggle svg{transition:transform .3s!important}

/* ══ UTIL BAR + NAV ══ */
.util-bar{background:var(--util-bg);height:34px;display:flex;align-items:center;padding:0 26px;position:relative;z-index:210;border-bottom:1px solid var(--line)}
.util-bar a{font-size:11px;color:var(--tx-3);font-weight:500;letter-spacing:.02em;margin-right:22px;transition:color .15s}
.util-bar a:hover{color:var(--tx)}
.util-bar-right{margin-left:auto;font-size:10px;color:var(--tx-4);font-weight:500;letter-spacing:.05em;white-space:nowrap;text-transform:uppercase}
.nav{position:sticky;top:0;z-index:200;background:var(--nav-bg);backdrop-filter:saturate(150%) blur(16px);-webkit-backdrop-filter:saturate(150%) blur(16px);border-bottom:1px solid var(--line);height:66px;display:flex;align-items:center;padding:0 26px;box-shadow:var(--sh-2)}
.nav-logo{display:flex;align-items:center;gap:12px;margin-right:34px;flex-shrink:0;text-decoration:none}
.nav-logo img{height:42px;width:42px;object-fit:contain;border-radius:7px;box-shadow:var(--sh-2),var(--edge);background:var(--surf-2)}
.nav-logo-text{display:flex;flex-direction:column;line-height:1}
.logo-main{font-family:var(--cond);font-weight:800;font-size:27px;color:var(--tx);letter-spacing:.5px;line-height:.9;display:block;text-transform:uppercase}
.logo-main span{color:var(--red)}
.logo-sub{font-size:8.5px;color:var(--tx-3);font-weight:600;letter-spacing:.3em;text-transform:uppercase;display:block;margin-top:4px}
[data-theme="light"] .logo-main{color:var(--tx)}
.nav-tabs{display:flex;align-items:center;flex:1;height:100%;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{display:inline-flex;align-items:center;height:100%;padding:0 17px;font-size:13.5px;font-weight:600;color:var(--tx-2);white-space:nowrap;border-bottom:2.5px solid transparent;transition:color .15s,border-color .15s;letter-spacing:.005em}
.nav-tab:hover{color:var(--tx)}
.nav-tab.active{color:var(--tx);border-bottom-color:var(--red);font-weight:700}
[data-theme="light"] .nav-tab.active{color:var(--tx)!important}
.nav-right{display:flex;align-items:center;gap:11px;margin-left:16px;flex-shrink:0}
.nav-search-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--line-2);background:var(--surf);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx-2);transition:.15s;position:relative;flex-shrink:0;font-size:17px}
.nav-search-btn:hover{color:#fff;border-color:var(--red);background:var(--surf-2)}
.nav-signin{display:inline-flex;align-items:center;padding:9px 20px;background:var(--red);border:1px solid var(--red);border-radius:6px;font-size:12px;font-weight:700;color:#fff;transition:.15s;letter-spacing:.05em;text-transform:uppercase;box-shadow:var(--sh-1)}
.nav-signin:hover{background:#ff5440;box-shadow:var(--glow-red)}
.search-panel{display:none;position:absolute;top:calc(100% + 12px);right:0;width:310px;background:var(--surf);border:1px solid var(--line-2);border-radius:11px;box-shadow:var(--sh-4);padding:12px;z-index:300}
.search-panel.open{display:block}
.search-panel input{width:100%;border:1px solid var(--line-2);border-radius:7px;padding:10px 12px;font-family:var(--sans);font-size:14px;outline:none;color:var(--tx);background:var(--bg-2)}
.search-panel input:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft)}
[data-theme="light"] .search-panel input{background:var(--bg)}
.sdrop-inner{margin-top:8px}
.si{display:flex;align-items:center;gap:11px;padding:8px;border-radius:6px;cursor:pointer;transition:background .12s}
.si:hover{background:var(--surf-2)}
.si img{width:36px;height:36px;border-radius:6px;object-fit:cover;border:1px solid var(--line-2);flex-shrink:0}
.si-nm{font-size:13px;font-weight:600;color:var(--tx)}
.si-mt{font-size:11px;color:var(--tx-3);margin-top:1px}
.s-empty{padding:12px;text-align:center;font-size:13px;color:var(--tx-4)}

/* ── Theme Toggle ── */
.theme-toggle{
  width:40px;height:40px;border-radius:50%;
  border:1px solid var(--theme-toggle-border);
  background:var(--theme-toggle-bg);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--theme-icon-color);
  flex-shrink:0;box-shadow:var(--sh-1);
}
.theme-toggle:hover{transform:scale(1.08);box-shadow:var(--sh-2)}
.theme-toggle svg{display:block;width:18px;height:18px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none}
.theme-toggle:hover svg{transform:rotate(22deg)}
.icon-sun{display:none}
.icon-moon{display:block}
[data-theme="light"] .icon-sun{display:block}
[data-theme="light"] .icon-moon{display:none}

/* ══ PAGE ══ */
.page{max-width:1100px;margin:0 auto;padding:26px}
.back{display:inline-flex;align-items:center;gap:7px;color:var(--tx-3);font-size:12.5px;margin-bottom:20px;padding:8px 15px;border-radius:20px;transition:all .15s;font-weight:600;background:var(--surf);border:1px solid var(--line-2);box-shadow:var(--sh-1);letter-spacing:.02em}
.back:hover{border-color:var(--line-3);color:var(--tx)}
.back .ic{font-size:14px}
.ad-wrap{text-align:center;margin:18px auto;overflow:hidden}

/* ══ HERO ══ */
.hero{background:var(--surf);border:1px solid var(--line-2);border-radius:13px;padding:28px;display:flex;gap:28px;align-items:flex-start;margin-bottom:18px;box-shadow:var(--sh-3);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:90px;background:linear-gradient(180deg,rgba(232,65,46,.10),transparent);pointer-events:none}
[data-theme="light"] .hero::before{background:linear-gradient(180deg,rgba(214,56,32,.07),transparent)}
.hav-wrap{position:relative;flex-shrink:0}
.hav{width:148px;height:185px;border-radius:12px;object-fit:cover;object-position:center top;background:var(--surf-2);border:2px solid var(--line-2);box-shadow:var(--sh-3);display:block}
.hflag{position:absolute;bottom:-8px;right:-8px;background:var(--surf-2);border:1px solid var(--line-2);border-radius:9px;min-width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:var(--sh-2);padding:0 6px}
.hinfo{flex:1;min-width:0;position:relative}
.hdiv{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:7px;display:flex;align-items:center;gap:8px}
.hdiv::before{content:'';width:22px;height:2px;background:var(--gold)}
.hname{font-family:var(--cond);font-size:clamp(32px,4vw,56px);font-weight:800;line-height:.9;margin-bottom:4px;color:var(--tx);letter-spacing:.3px;text-transform:uppercase}
.hname-en{font-family:var(--cond);font-size:16px;color:var(--tx-2);margin-bottom:12px;font-weight:600;letter-spacing:.2px}
.htags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
.htag{background:var(--surf-2);border:1px solid var(--line-2);border-radius:20px;padding:4px 11px;font-size:12px;color:var(--tx-2);font-weight:600;display:inline-flex;align-items:center;gap:6px;letter-spacing:.01em}
.htag .ic{font-size:13px;color:var(--tx-4)}
.htag.htag-pts{background:var(--gold-soft);border-color:var(--gold-line);color:var(--gold)}
.htag.htag-pts .ic{color:var(--red)}
.hrec{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.rn{font-family:var(--cond);font-size:36px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:.5px}
.rn.w{color:var(--green)}.rn.l{color:var(--red)}.rn.n{color:var(--gold)}
.rl{font-family:var(--cond);font-size:10px;color:var(--tx-4);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;font-weight:700}
.rsep{color:var(--line-2);font-size:26px;align-self:flex-start;margin-top:2px}
.hrec .wr-box{margin-left:6px}
.wr-bar{height:6px;background:var(--surf-3);border-radius:3px;overflow:hidden}
.wr-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--red))}

/* ══ UPCOMING NOTE ══ */
.unote{background:var(--blue-soft);border:1px solid var(--blue-line);border-radius:9px;padding:13px 17px;margin-bottom:16px;display:flex;align-items:center;gap:11px;font-size:13px;font-weight:600;color:var(--blue);box-shadow:var(--sh-1)}
.pulse{width:9px;height:9px;border-radius:50%;background:var(--blue);flex-shrink:0;animation:pulse 1.6s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(59,141,240,.4)}70%{box-shadow:0 0 0 7px rgba(59,141,240,0)}100%{box-shadow:0 0 0 0 rgba(59,141,240,0)}}

/* ══ PHYSICAL GRID ══ */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(124px,1fr));gap:12px;margin-bottom:18px}
.pitem{background:var(--surf-2);border:1px solid var(--line-2);border-radius:11px;padding:16px 14px;text-align:center;box-shadow:var(--sh-2)}
.pval{font-family:var(--cond);font-size:22px;font-weight:800;color:var(--tx);font-variant-numeric:tabular-nums;line-height:1}
.pitem.accent .pval{color:var(--gold)}
.plbl{font-size:9.5px;color:var(--tx-4);text-transform:uppercase;letter-spacing:.1em;margin-top:6px;font-weight:700}

/* ══ FORM BAR ══ */
.form-label{font-size:10px;color:var(--tx-4);margin-bottom:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.fbar{display:flex;gap:4px;margin-bottom:20px}
.fseg{flex:1;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:.04em}
.fseg.win{background:var(--green-soft);color:var(--green)}
.fseg.loss{background:var(--red-soft);color:var(--red)}
.fseg.nc{background:var(--gold-soft);color:var(--gold)}
.fseg.upcoming{background:var(--blue-soft);color:var(--blue)}

/* ══ TABS ══ */
.ptabs{display:flex;gap:5px;background:var(--surf-2);border:1px solid var(--line-2);border-radius:9px;padding:5px;margin-bottom:16px;flex-wrap:wrap}
.ptab{padding:9px 20px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--tx-3);cursor:pointer;letter-spacing:.01em}
.ptab:hover{color:var(--tx)}
.ptab.active{background:var(--red);color:#fff;box-shadow:var(--sh-1)}
.ppanel{display:none}
.ppanel.active{display:block}

/* ══ CARD + TABLE ══ */
.card{background:var(--surf);border:1px solid var(--line-2);border-radius:11px;box-shadow:var(--sh-3)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl thead tr{background:var(--surf-3)}
[data-theme="light"] .tbl thead tr{background:var(--surf-2)}
.tbl th{padding:12px 13px;text-align:left;font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx-3);white-space:nowrap}
.tbl td{padding:13px 13px;border-bottom:1px solid var(--line);vertical-align:middle;color:var(--tx)}
.tbl tbody tr{transition:background .12s!important}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover{background:var(--surf-2)}

/* result badges */
.bw,.bl,.bu,.bn{display:inline-block;font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;letter-spacing:.02em;white-space:nowrap}
.bw{background:var(--green-soft);color:var(--green)}
.bl{background:var(--red-soft);color:var(--red)}
.bu{background:var(--blue-soft);color:var(--blue)}
.bn{background:var(--surf-3);color:var(--tx-3)}

.opp-row{display:flex;align-items:center;gap:11px}
.opp-av{width:50px;height:50px;border-radius:8px;object-fit:cover;object-position:center top;background:var(--surf-2);border:1px solid var(--line-2);flex-shrink:0;cursor:pointer;box-shadow:var(--sh-1)}
.opp-av:hover{border-color:var(--red);box-shadow:var(--sh-2)}
.opp-av.no-link{cursor:default}
.opp-av.no-link:hover{border-color:var(--line-2);box-shadow:var(--sh-1)}
.opp-name-link{font-weight:700;font-size:13px;color:var(--tx);cursor:pointer;transition:color .15s!important;display:block}
.opp-name-link:hover{color:var(--red)}
.opp-name-nolink{font-weight:700;font-size:13px;color:var(--tx);display:block}

.deco-pill{background:var(--surf-2);border:1px solid var(--line-2);padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700;color:var(--tx-2);display:inline-block}
.weigh-badge{display:inline-flex;align-items:center;gap:4px;background:var(--green-soft);color:var(--green);border:1px solid rgba(52,210,127,.3);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;white-space:nowrap}
[data-theme="light"] .weigh-badge{border-color:rgba(26,159,92,.3)}
.weigh-badge .ic{font-size:12px}
.dash{color:var(--line-3);font-size:12px}
[data-theme="light"] .dash{color:var(--tx-4)}

.stars{color:var(--gold);font-size:13px;letter-spacing:1px;white-space:nowrap;text-shadow:0 0 6px rgba(244,183,64,.4)}
[data-theme="light"] .stars{text-shadow:none}
.stars-empty{color:var(--line-2);opacity:.5}

/* ══ RESPONSIVE ══ */
@media(max-width:860px){.util-bar{display:none}}
@media(max-width:640px){
  body{font-size:14px}
  .nav{padding:0 16px;height:60px}.logo-main{font-size:22px}
  .page{padding:16px}
  .nav-tab{padding:0 12px;font-size:12px}.nav-signin{display:none}
  .tbl{font-size:12px}.tbl th,.tbl td{padding:10px 8px}
}
@media(max-width:580px){
  .hero{flex-direction:column;align-items:center;text-align:center;padding:24px 20px}
  .hav{width:130px;height:165px}
  .hdiv{justify-content:center}.hdiv::before{display:none}
  .hrec{justify-content:center}.htags{justify-content:center}
  .opp-av{width:42px;height:42px}
  .tbl .col-hide-sm{display:none}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>

<div class="page">
  <a class="back" href="index.html"><span class="ic"><svg viewBox="0 0 24 24"><use href="#i-arrow-left"/></svg></span> กลับหน้าอันดับ</a>

  <div id="root"></div>
  <div class="ad-wrap" id="ad-bottom"></div>
</div>

<footer id="ft"></footer>

<script src="data/fighters_data.js"></script>
<script src="utils.js"></script>
<script>
var PH_IMG="images/noname1.png";
/* override PH global จาก utils.js */
PH="images/noname1.png";
function svgIcon(id,sz){return '<span class="ic" style="font-size:'+(sz||14)+'px"><svg viewBox="0 0 24 24"><use href="#'+id+'"/></svg></span>';}

function heroImg(filename){
    if(!filename) return PH_IMG;
    var clean=String(filename).replace(/\.(jpg|jpeg|png|webp)$/i,'');
    return 'https://res.cloudinary.com/'+CLOUD+'/image/upload/c_fill,g_face,w_440,h_550,f_auto,q_auto/'+encodeURIComponent(clean);
}

function init(){
    var id=parseInt(new URLSearchParams(location.search).get('id'));
    var f=FIGHTERS.find(function(x){return x.id===id;});
    if(!f){
        document.getElementById('root').innerHTML=
            '<div style="text-align:center;padding:80px 0;color:var(--tx-3)">'+
            svgIcon('i-glove',48)+
            '<div style="font-size:18px;margin-top:14px;font-weight:600">ไม่พบนักมวย</div>'+
            '<a href="index.html" style="color:var(--red);display:inline-block;margin-top:12px;font-weight:600">‹ กลับหน้าหลัก</a></div>';
        return;
    }

    var h=hist(f.id);
    var past=h.filter(function(x){return x.result_type!=='upcoming';});
    var sc=score(h);
    var upRaw=h.filter(function(x){return x.result_type==='upcoming';});
    var up=upRaw.filter(function(u){
        return !past.some(function(p){return p.opponent===u.opponent&&p.event===u.event;});
    });

    var fighterImg=cImg(f.image_filename,'lg');
    setMeta({
        title:f.name_th+(f.name_en?' ('+esc(f.name_en)+')':'')+' สถิตินักมวย',
        titleEn:(f.name_en||f.name_th)+' Fighter Stats & Record',
        desc:f.name_th+' นักมวย ONE Championship '+(f.division||'')+' '+f.total_wins+'W '+f.total_losses+'L WR '+f.win_rate+'% | Boxfan',
        descEn:(f.name_en||f.name_th)+' ONE Championship fighter record '+f.total_wins+'W '+f.total_losses+'L '+f.win_rate+'% win rate',
        url:SITE+'/profile.html?id='+id,
        image:fighterImg,type:'profile',
        keywords:f.name_th+','+(f.name_en||'')+',ONE Championship,'+(f.division||'')+',มวยไทย,Muay Thai,Boxfan',
        jsonld:{'@context':'https://schema.org','@type':'Person','name':f.name_th,'alternateName':f.name_en||undefined,'description':f.biography||(f.name_th+' นักมวย ONE Championship'),'image':fighterImg,'url':SITE+'/profile.html?id='+id,'nationality':f.country||undefined,'sport':'Muay Thai / Kickboxing / MMA','memberOf':{'@type':'SportsOrganization','name':'ONE Championship'}}
    });

    document.title=f.name_th+' — Boxfan';
    renderFooter(f.name_th);
    var html='';

    /* HERO */
    html+='<div class="hero">';
    html+='<div class="hav-wrap">';
    html+='<img class="hav" src="'+heroImg(f.image_filename)+'" onerror="this.src=PH_IMG" alt="'+esc(f.name_th)+'">';
    html+='<div class="hflag">'+fl(f.country)+'</div>';
    html+='</div>';
    html+='<div class="hinfo">';
    if(f.division) html+='<div class="hdiv">'+f.division+'</div>';
    html+='<h1 class="hname">'+esc(f.name_th)+'</h1>';
    if(f.name_en) html+='<div class="hname-en">'+esc(f.name_en)+'</div>';
    html+='<div class="htags">';
    if(f.country) html+='<span class="htag">'+fl(f.country)+' '+esc(f.country)+'</span>';
    if(f.team) html+='<span class="htag">'+svgIcon('i-team',13)+esc(f.team)+'</span>';
    if(f.age) html+='<span class="htag">อายุ '+f.age+' ปี</span>';
    html+='<span class="htag htag-pts">'+svgIcon('i-star',13)+sc+' pts</span>';
    html+='</div>';
    html+='<div class="hrec">';
    html+='<div><div class="rn w">'+f.total_wins+'</div><div class="rl">ชนะ</div></div>';
    html+='<div class="rsep">–</div>';
    html+='<div><div class="rn l">'+f.total_losses+'</div><div class="rl">แพ้</div></div>';
    if(f.total_nc>0){
        html+='<div class="rsep">–</div>';
        html+='<div><div class="rn n">'+f.total_nc+'</div><div class="rl">NC</div></div>';
    }
    html+='<div class="wr-box">';
    html+='<div class="wr-bar" style="width:96px"><div class="wr-fill" style="width:'+(f.win_rate||0)+'%"></div></div>';
    html+='<div style="font-size:11px;color:var(--tx-3);margin-top:5px;font-weight:600">WR '+(f.win_rate||0).toFixed(1)+'%</div>';
    html+='</div></div></div></div>';

    /* UPCOMING */
    if(up.length){
        html+='<div class="unote"><div class="pulse"></div><strong>แมตช์ที่กำลังจะมา:</strong>&nbsp;';
        html+=up.map(function(u){return u.opponent+' · '+u.event+(u.date?' ('+fDate(u.date)+')':'');}).join(' / ');
        html+='</div>';
    }

    /* PHYSICAL */
    html+='<div class="pgrid">';
    if(f.height_ft_in) html+='<div class="pitem"><div class="pval">'+f.height_ft_in+'</div><div class="plbl">ส่วนสูง</div></div>';
    if(f.height_cm) html+='<div class="pitem"><div class="pval">'+f.height_cm+'</div><div class="plbl">ซม.</div></div>';
    if(f.weight_lbs) html+='<div class="pitem"><div class="pval">'+f.weight_lbs+'</div><div class="plbl">ปอนด์</div></div>';
    if(f.weight_kg) html+='<div class="pitem"><div class="pval">'+f.weight_kg+'</div><div class="plbl">กก.</div></div>';
    html+='<div class="pitem accent"><div class="pval">'+sc+'</div><div class="plbl">คะแนน</div></div>';
    html+='<div class="pitem"><div class="pval">'+f.total_fights+'</div><div class="plbl">แมตช์รวม</div></div>';
    html+='</div>';

    /* FORM BAR */
    if(past.length){
        html+='<div class="form-label">ฟอร์มล่าสุด '+Math.min(past.length,10)+' แมตช์</div>';
        html+='<div class="fbar">';
        past.slice(0,10).reverse().forEach(function(x){
            var lbl=x.result_type==='win'?'W':x.result_type==='loss'?'L':'NC';
            html+='<div class="fseg '+x.result_type+'" title="'+fDate(x.date)+' vs '+(x.opponent||'')+'">'+lbl+'</div>';
        });
        html+='</div>';
    }

    /* TABS */
    html+='<div class="ptabs">';
    html+='<div class="ptab active" data-p="h">ประวัติการชก ('+(past.length+up.length)+')</div>';
    if(f.biography) html+='<div class="ptab" data-p="b">ประวัติ</div>';
    html+='</div>';

    /* HISTORY TAB */
    html+='<div class="ppanel active" id="pp-h">';
    html+='<div class="card" style="overflow:hidden">';
    if(past.length||up.length){
        html+='<table class="tbl"><thead><tr>';
        html+='<th>ผล</th><th>คู่ต่อสู้</th><th class="col-hide-sm">วิธี/ยก</th><th class="col-hide-sm">น้ำหนักชั่ง</th><th class="col-hide-sm">กติกา</th><th class="col-hide-sm">อีเวนต์</th><th>วันที่</th><th class="col-hide-sm">คุณภาพ</th>';
        html+='</tr></thead><tbody>';

        up.forEach(function(x){
            var oppF=FIGHTERS.find(function(ff){return ff.name_th===x.opponent||ff.name_en===x.opponent;});
            var oppImg2=oppF?cImg(oppF.image_filename,'md'):PH_IMG;
            var oppLink=oppF?'profile.html?id='+oppF.id:'';
            html+='<tr style="background:linear-gradient(90deg,rgba(59,141,240,.04),transparent)">';
            html+='<td><span class="bu">รอผล</span></td>';
            html+='<td><div class="opp-row">';
            if(oppLink){
                html+='<img class="opp-av" src="'+oppImg2+'" loading="lazy" onerror="this.src=PH_IMG" alt="" onclick="location.href=\''+oppLink+'\'">';
                html+='<div><span class="opp-name-link" onclick="location.href=\''+oppLink+'\'">'+esc(x.opponent||'—')+'</span>';
            }else{
                html+='<img class="opp-av no-link" src="'+oppImg2+'" loading="lazy" onerror="this.src=PH_IMG" alt="">';
                html+='<div><span class="opp-name-nolink">'+esc(x.opponent||'—')+'</span>';
            }
            if(x.opponent_country&&x.opponent_country!=='-') html+='<div style="font-size:11px;color:var(--tx-3)">'+fl(x.opponent_country)+' '+esc(x.opponent_country)+'</div>';
            html+='</div></div></td>';
            html+='<td class="col-hide-sm"><span class="dash">—</span></td>';
            html+='<td class="col-hide-sm">'+(x.weigh_in_lbs&&x.weigh_in_lbs>0?'<span class="weigh-badge">'+svgIcon('i-scale',12)+x.weigh_in_lbs+' lbs</span>':'<span class="dash">—</span>')+'</td>';
            html+='<td class="col-hide-sm" style="font-size:12px;color:var(--tx-3)">'+esc(x.rules||'—')+'</td>';
            html+='<td class="col-hide-sm" style="font-size:12px">'+esc(x.event||'—')+'</td>';
            html+='<td style="color:var(--blue);font-size:12px;white-space:nowrap;font-weight:700">'+fDate(x.date)+'</td>';
            html+='<td class="col-hide-sm"><span class="dash">—</span></td>';
            html+='</tr>';
        });

        past.forEach(function(x){
            var oppF=FIGHTERS.find(function(ff){return ff.name_th===x.opponent||ff.name_en===x.opponent;});
            var oppImg2=oppF?cImg(oppF.image_filename,'md'):PH_IMG;
            var oppLink=oppF?'profile.html?id='+oppF.id:'';
            html+='<tr>';
            html+='<td><span class="'+rClass(x.result_type)+'">'+rLabel(x.result_type)+'</span></td>';
            html+='<td><div class="opp-row">';
            if(oppLink){
                html+='<img class="opp-av" src="'+oppImg2+'" loading="lazy" onerror="this.src=PH_IMG" alt="" onclick="location.href=\''+oppLink+'\'">';
                html+='<div><span class="opp-name-link" onclick="location.href=\''+oppLink+'\'">'+esc(x.opponent||'—')+'</span>';
            }else{
                html+='<img class="opp-av no-link" src="'+oppImg2+'" loading="lazy" onerror="this.src=PH_IMG" alt="">';
                html+='<div><span class="opp-name-nolink">'+esc(x.opponent||'—')+'</span>';
            }
            if(x.opponent_country&&x.opponent_country!=='-') html+='<div style="font-size:11px;color:var(--tx-3)">'+fl(x.opponent_country)+' '+esc(x.opponent_country)+'</div>';
            html+='</div></div></td>';
            html+='<td class="col-hide-sm">';
            if(x.decision) html+='<span class="deco-pill">'+esc(x.decision)+'</span>';
            else html+='<span class="dash">—</span>';
            if(x.round) html+='<div style="font-size:11px;color:var(--tx-3);margin-top:3px">ยก '+x.round+(x.time?' · '+x.time:'')+'</div>';
            html+='</td>';
            html+='<td class="col-hide-sm">'+(x.weigh_in_lbs&&x.weigh_in_lbs>0?'<span class="weigh-badge">'+svgIcon('i-scale',12)+x.weigh_in_lbs+' lbs</span>':'<span class="dash">—</span>')+'</td>';
            html+='<td class="col-hide-sm" style="color:var(--tx-3);font-size:12px">'+esc(x.rules||'—')+'</td>';
            html+='<td class="col-hide-sm" style="font-size:12px">'+esc(x.event||'—')+'</td>';
            html+='<td style="color:var(--tx-3);font-size:12px;white-space:nowrap">'+fDate(x.date)+'</td>';
            html+='<td class="col-hide-sm">'+((x.fight_rating_stars&&x.fight_rating_stars>0)?stars(x.fight_rating_stars):'<span class="dash">—</span>')+'</td>';
            html+='</tr>';
        });
        html+='</tbody></table>';
    }else{
        html+='<div style="padding:32px;text-align:center;color:var(--tx-3)">ยังไม่มีประวัติการชก</div>';
    }
    html+='</div></div>';

    /* BIO TAB */
    if(f.biography){
        html+='<div class="ppanel" id="pp-b"><div class="card" style="padding:24px">';
        html+='<p style="line-height:1.9;color:var(--tx-2);font-size:14px;margin:0">'+esc(f.biography)+'</p>';
        html+='</div></div>';
    }

    document.getElementById('root').innerHTML=html;
    document.querySelectorAll('.ptab').forEach(function(t){
        t.addEventListener('click',function(){
            document.querySelectorAll('.ptab').forEach(function(x){x.classList.remove('active');});
            document.querySelectorAll('.ppanel').forEach(function(x){x.classList.remove('active');});
            t.classList.add('active');
            var p=document.getElementById('pp-'+t.dataset.p);
            if(p) p.classList.add('active');
        });
    });
}

/* ── nav search ── */
function toggleSearch(){
    var p=document.getElementById('search-panel');
    p.classList.toggle('open');
    if(p.classList.contains('open')) setTimeout(function(){document.getElementById('sinput').focus();},50);
}
document.addEventListener('click',function(e){
    if(!e.target.closest('#search-toggle')){var p=document.getElementById('search-panel');if(p)p.classList.remove('open');}
});
function setupSearch(){
    var inp=document.getElementById('sinput'),drop=document.getElementById('sdrop');
    if(!inp||!drop) return;
    inp.addEventListener('input',function(){
        var q=inp.value.trim().toLowerCase();
        if(!q||typeof FIGHTERS==='undefined'){drop.innerHTML='';return;}
        var hits=FIGHTERS.filter(function(f){
            return (f.name_th||'').toLowerCase().indexOf(q)!==-1||(f.name_en||'').toLowerCase().indexOf(q)!==-1;
        }).slice(0,7);
        drop.innerHTML=hits.length?hits.map(function(f){
            return '<a class="si" href="profile.html?id='+f.id+'">'+
                '<img src="'+cImg(f.image_filename,'sm')+'" loading="lazy" onerror="this.src=PH_IMG" alt="">'+
                '<div><div class="si-nm">'+esc(f.name_th)+'</div><div class="si-mt">'+fl(f.country)+' · '+ds(f.division)+'</div></div>'+
            '</a>';
        }).join(''):'<div class="s-empty">ไม่พบ "'+esc(inp.value)+'"</div>';
    });
}

if(typeof FIGHTERS==='undefined'){
    document.getElementById('root').innerHTML='<div style="text-align:center;padding:80px 0;color:var(--red);font-weight:600">'+svgIcon('i-glove',40)+'<div style="margin-top:12px">ไม่พบ fighters_data.js</div></div>';
}else{
    setupSearch();
    init();
}

/* ══ THEME TOGGLE ══ */
function toggleTheme(){
    var html=document.documentElement;
    var isLight=html.getAttribute('data-theme')==='light';
    html.setAttribute('data-theme',isLight?'dark':'light');
    try{localStorage.setItem('boxfan-theme',isLight?'dark':'light');}catch(e){}
}
/* โหลด theme ที่บันทึกไว้ทันทีก่อน paint */
(function(){
    try{var s=localStorage.getItem('boxfan-theme');if(s==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}
})();
</script>
